# Deploy the Vite + React client to Azure Static Web Apps.
#
# === GitHub secrets (Settings → Secrets and variables → Actions) ===
#   AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FOREST_0B6614703
#   VITE_API_BASE_URL — API base URL, no trailing slash (see checklist in team docs / Azure section).
#
name: Deploy client to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

concurrency:
  group: deploy-client-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Build and deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      # Build here so VITE_* is guaranteed (Oryx inside SWA deploy often does not see job env).
      - name: Install and build
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm ci && npm run build

      - name: Verify dist (HTML must reference /assets/*.js, not /src/)
        run: |
          test -f client/dist/index.html
          grep -q '/assets/.*\.js' client/dist/index.html || (echo 'dist/index.html missing Vite asset bundle'; exit 1)
          ls -la client/dist/assets/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FOREST_0B6614703 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client
          api_location: ''
          output_location: dist
          skip_app_build: true
