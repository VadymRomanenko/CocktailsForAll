version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cocktailhub_postgres
    environment:
      POSTGRES_USER: cocktailhub
      POSTGRES_PASSWORD: cocktailhub
      POSTGRES_DB: cocktailhub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocktailhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
